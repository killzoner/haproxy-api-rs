global
    master-worker
    tune.lua.bool-sample-conversion normal
    # MacOS
    lua-prepend-path "../../target/debug/lib?.dylib" cpath
    lua-prepend-path "target/release/lib?.so" cpath
    lua-load haproxy.lua
    ssl-server-verify none

defaults
    mode http
    option httplog
    log stdout format raw daemon info
    timeout connect 1s
    timeout client 3s
    timeout server 3s

frontend http-in
    bind 127.0.0.1:8080
    default_backend servers

backend servers
    http-request set-header X-Request-URI %[capture.req.uri]
    http-request lua.rust_req
    server default httpbin.org:443 ssl
    http-after-response lua.rust_resp

listen metrics
    bind 127.0.0.1:9000
    http-request use-service lua.serve_metrics
